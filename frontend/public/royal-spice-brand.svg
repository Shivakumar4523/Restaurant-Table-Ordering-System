<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 779" role="img" aria-labelledby="title desc">
  <title id="title">Shiva Royal Spice Restaurant and Bar</title>
  <desc id="desc">Wide dark green and black Royal Spice Restaurant and Bar banner with gold borders and a plate icon.</desc>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff6bd"/>
      <stop offset="0.38" stop-color="#f7cf62"/>
      <stop offset="0.7" stop-color="#d99b24"/>
      <stop offset="1" stop-color="#8f5e10"/>
    </linearGradient>
    <linearGradient id="whiteMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#f7f7f7"/>
      <stop offset="0.72" stop-color="#dedede"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="50%" cy="46%" r="62%">
      <stop offset="0" stop-color="#0d2a1d"/>
      <stop offset="0.62" stop-color="#04130e"/>
      <stop offset="1" stop-color="#010302"/>
    </radialGradient>
    <radialGradient id="plate" cx="35%" cy="27%" r="78%">
      <stop offset="0" stop-color="#fff7bc"/>
      <stop offset="0.44" stop-color="#f6c95a"/>
      <stop offset="0.78" stop-color="#c88418"/>
      <stop offset="1" stop-color="#6f470b"/>
    </radialGradient>
    <filter id="deepShadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="8" dy="14" stdDeviation="9" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="7" dy="9" stdDeviation="4" flood-color="#000000" flood-opacity="0.82"/>
      <feDropShadow dx="1.5" dy="2" stdDeviation="0.5" flood-color="#c88618" flood-opacity="0.9"/>
    </filter>
    <filter id="goldGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f6c95a" flood-opacity="0.45"/>
      <feDropShadow dx="5" dy="7" stdDeviation="5" flood-color="#000000" flood-opacity="0.72"/>
    </filter>
  </defs>

  <rect width="2048" height="779" fill="#000000"/>
  <rect x="34" y="126" width="1980" height="532" rx="58" fill="url(#greenGlow)" stroke="url(#gold)" stroke-width="5"/>
  <rect x="48" y="140" width="1952" height="504" rx="48" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.98"/>

  <g transform="translate(115 218)" filter="url(#deepShadow)">
    <circle cx="160" cy="160" r="156" fill="#030906"/>
    <circle cx="160" cy="160" r="146" fill="url(#plate)" stroke="#ffe992" stroke-width="7"/>
    <circle cx="160" cy="160" r="130" fill="none" stroke="#6d440a" stroke-width="5" opacity="0.65"/>
    <g fill="#02110c">
      <rect x="91" y="77" width="14" height="150" rx="7"/>
      <rect x="116" y="77" width="14" height="150" rx="7"/>
      <rect x="141" y="77" width="14" height="150" rx="7"/>
      <rect x="116" y="220" width="14" height="56"/>
      <path d="M227 72c43 0 63 58 58 115-4 48-21 73-42 85v15h-29v-15c-21-12-38-37-42-85-5-57 12-115 55-115Z"/>
    </g>
  </g>

  <text x="1090" y="288" text-anchor="middle" fill="url(#gold)" filter="url(#goldGlow)"
        font-family="Brush Script MT, Segoe Script, Lucida Handwriting, cursive" font-size="116" font-style="italic" font-weight="700">Shiva</text>

  <text x="1126" y="458" text-anchor="middle" fill="url(#whiteMetal)" filter="url(#textShadow)"
        font-family="Georgia, Times New Roman, serif" font-size="212" font-weight="900" letter-spacing="1">Royal Spice</text>

  <text x="1160" y="588" text-anchor="middle" fill="url(#gold)" filter="url(#goldGlow)"
        font-family="Georgia, Times New Roman, serif" font-size="96" font-weight="900" letter-spacing="3">Restaurant and Bar</text>
</svg>
